<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OTP Code</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f4f5; font-family:Arial, sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" border="0" align="center">
    <tr>
      <td align="center" style="padding:30px 0;">

        <!-- Outer Container -->
        <table width="360" cellpadding="0" cellspacing="0" border="0" style="background:#1a1c1e; border-radius:30px; padding:10px;">
          
          <!-- Green Card -->
          <tr>
            <td style="background:#9ce564; border-radius:20px; padding:15px; text-align:right;">
              <span style="color:#1f3a14; font-weight:bold; font-size:16px;">
                secure
              </span>
            </td>
          </tr>

          <!-- White Card -->
          <tr>
            <td style="background:#ffffff; border-radius:20px; padding:15px; text-align:right; margin-top:10px;">
              <span style="color:#ea4c5b; font-weight:bold; font-size:16px;">
                auth
              </span>
            </td>
          </tr>

          <!-- OTP Section -->
          <tr>
            <td style="background:#1a1c1e; border-radius:20px; padding:25px; text-align:left;">

              <!-- Title -->
              <p style="color:#ffffff; font-size:20px; margin:0 0 20px 0;">
                Zipp's Mail Code
              </p>

              <!-- OTP -->
              <p style="
                color:#f5f5f7;
                font-size:40px;
                font-weight:bold;
                letter-spacing:5px;
                margin:0 0 10px 0;
              ">
                {{OTP_CODE}}
              </p>

              <!-- Subtitle -->
              <p style="color:#86868b; font-size:14px; margin:0;">
                One-Time Password
              </p>

            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
